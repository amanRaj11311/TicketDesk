name: untitled13
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.1
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.1
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  http: ^1.6.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png

# 👇 MUST be outside flutter
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

# 👇 Splash screen config here
flutter_native_splash:
  color: "#F3C300"
  image: "assets/icons/app_icon.png"
  android_12:
    color: "#F3C300"
    image: "assets/icons/app_icon.png"